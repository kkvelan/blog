<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" role="img" aria-labelledby="t5 d5">
  <title id="t5">Syscall flow</title>
  <desc id="d5">User program to kernel handler and back.</desc>
  <rect width="680" height="200" fill="#0d0d0d"/>
  <text x="340" y="24" text-anchor="middle" fill="#e8e8e8" font-size="14" font-family="system-ui,sans-serif" font-weight="600">Syscall (high level)</text>
  <rect x="24" y="48" width="128" height="68" rx="6" fill="#1e3a5f" stroke="#7eb8ff" stroke-width="2"/>
  <text x="88" y="78" text-anchor="middle" fill="#e8e8e8" font-size="11" font-family="system-ui,sans-serif" font-weight="600">User</text>
  <text x="88" y="94" text-anchor="middle" fill="#a8c8e8" font-size="9" font-family="system-ui,sans-serif">program</text>
  <text x="88" y="108" text-anchor="middle" fill="#a8c8e8" font-size="9" font-family="system-ui,sans-serif">ring 3</text>
  <path d="M 158 82 L 208 82" stroke="#7eb8ff" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7eb8ff"/></marker></defs>
  <rect x="216" y="48" width="128" height="68" rx="6" fill="#3a2818" stroke="#c67b35" stroke-width="2"/>
  <text x="280" y="78" text-anchor="middle" fill="#e8e8e8" font-size="11" font-family="system-ui,sans-serif" font-weight="600">CPU</text>
  <text x="280" y="94" text-anchor="middle" fill="#d4b896" font-size="9" font-family="system-ui,sans-serif">switch to</text>
  <text x="280" y="108" text-anchor="middle" fill="#d4b896" font-size="9" font-family="system-ui,sans-serif">kernel mode</text>
  <path d="M 350 82 L 400 82" stroke="#7eb8ff" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="408" y="44" width="248" height="76" rx="6" fill="#1a3020" stroke="#4a8a5a" stroke-width="2"/>
  <text x="532" y="72" text-anchor="middle" fill="#e8e8e8" font-size="11" font-family="system-ui,sans-serif" font-weight="600">Linux handler</text>
  <text x="532" y="90" text-anchor="middle" fill="#a8d8b8" font-size="9" font-family="system-ui,sans-serif">read credentials, allow or deny</text>
  <text x="532" y="106" text-anchor="middle" fill="#a8d8b8" font-size="9" font-family="system-ui,sans-serif">(for example EPERM)</text>
  <text x="340" y="168" text-anchor="middle" fill="#888" font-size="10" font-family="system-ui,sans-serif">Return path: kernel back to user with a result or error code.</text>
</svg>
