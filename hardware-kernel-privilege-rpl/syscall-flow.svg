<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="t5 d5">
  <title id="t5">Syscall flow</title>
  <desc id="d5">User program to kernel handler and back.</desc>
  <rect width="640" height="200" fill="#0d0d0d"/>
  <text x="320" y="26" text-anchor="middle" fill="#e8e8e8" font-size="15" font-family="system-ui,sans-serif" font-weight="600">What happens on a syscall (very high level)</text>
  <rect x="40" y="52" width="140" height="64" rx="6" fill="#1e3a5f" stroke="#7eb8ff" stroke-width="2"/>
  <text x="110" y="82" text-anchor="middle" fill="#e8e8e8" font-size="12" font-family="system-ui,sans-serif" font-weight="600">User program</text>
  <text x="110" y="100" text-anchor="middle" fill="#a8c8e8" font-size="10" font-family="system-ui,sans-serif">ring 3</text>
  <path d="M 190 84 L 240 84" stroke="#7eb8ff" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#7eb8ff"/></marker></defs>
  <rect x="250" y="52" width="140" height="64" rx="6" fill="#3a2818" stroke="#c67b35" stroke-width="2"/>
  <text x="320" y="82" text-anchor="middle" fill="#e8e8e8" font-size="12" font-family="system-ui,sans-serif" font-weight="600">CPU switch</text>
  <text x="320" y="100" text-anchor="middle" fill="#d4b896" font-size="10" font-family="system-ui,sans-serif">to kernel mode</text>
  <path d="M 400 84 L 450 84" stroke="#7eb8ff" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="48" width="150" height="72" rx="6" fill="#1a3020" stroke="#4a8a5a" stroke-width="2"/>
  <text x="535" y="78" text-anchor="middle" fill="#e8e8e8" font-size="12" font-family="system-ui,sans-serif" font-weight="600">Linux handler</text>
  <text x="535" y="96" text-anchor="middle" fill="#a8d8b8" font-size="10" font-family="system-ui,sans-serif">read creds, decide</text>
  <text x="535" y="110" text-anchor="middle" fill="#a8d8b8" font-size="10" font-family="system-ui,sans-serif">allow or error</text>
  <text x="320" y="168" text-anchor="middle" fill="#888" font-size="11" font-family="system-ui,sans-serif">Return path: kernel ’ user, with a result or error code.</text>
</svg>
