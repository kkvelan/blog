# Site settings
title: "kkvelan"
description: "Blog"
baseurl: "/blog"    # repo is kkvelan/blog → https://kkvelan.github.io/blog
url: "https://kkvelan.github.io"

# Google Analytics (GA4). Set to your Measurement ID (e.g. G-XXXXXXXXXX) to enable. Leave blank to disable.
google_analytics: "G-C0J6XB178W"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (all supported on GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - .gitignore
