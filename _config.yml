# Site settings
title: "kkvelan"
description: "Blog"
baseurl: "/blog"    # repo is kkvelan/blog → https://kkvelan.github.io/blog
url: "https://kkvelan.github.io"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (all supported on GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - script
  - .git
  - .gitignore
